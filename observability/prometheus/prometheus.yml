global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/orders-api.slo.rules.yml
  - /etc/prometheus/rules/mesh.slo.rules.yml
  - /etc/prometheus/rules/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: orders-api
    static_configs:
      - targets: ['orders-api:8080']
  - job_name: payments-worker
    static_configs:
      - targets: ['payments-worker:8000']
  - job_name: notification-svc
    static_configs:
      - targets: ['notification-svc:8081']
  - job_name: mock-gateway
    static_configs:
      - targets: ['mock-gateway:8090']
  - job_name: mock-receiver
    static_configs:
      - targets: ['mock-receiver:8091']
  - job_name: slo-bff
    static_configs:
      - targets: ['slo-bff:9090']
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
