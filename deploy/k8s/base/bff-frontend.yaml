apiVersion: apps/v1
kind: Deployment
metadata:
  name: slo-bff
spec:
  replicas: 1
  selector: { matchLabels: { app: slo-bff } }
  template:
    metadata: { labels: { app: slo-bff } }
    spec:
      containers:
        - name: slo-bff
          image: slo/slo-bff:dev
          imagePullPolicy: IfNotPresent
          env:
            - { name: PROMETHEUS_URL, value: "http://prometheus:9090" }
            - { name: TEMPO_URL, value: "http://tempo:3200" }
            - { name: LOKI_URL, value: "http://loki:3100" }
            - { name: GRAFANA_URL, value: "http://localhost:30001" }
            - { name: RUNBOOKS_DIR, value: "/runbooks" }
            - { name: ADDR, value: ":9090" }
          ports: [{ containerPort: 9090 }]
          volumeMounts: [{ name: runbooks, mountPath: /runbooks }]
      volumes:
        - name: runbooks
          configMap: { name: runbooks }
---
apiVersion: v1
kind: Service
metadata:
  name: slo-bff
spec:
  selector: { app: slo-bff }
  ports: [{ port: 9090, targetPort: 9090 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
        - name: frontend
          image: slo/frontend:dev
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: NodePort
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 80, nodePort: 30000 }]
