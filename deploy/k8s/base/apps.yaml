apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
spec:
  replicas: 1
  selector: { matchLabels: { app: orders-api } }
  template:
    metadata: { labels: { app: orders-api } }
    spec:
      containers:
        - name: orders-api
          image: slo/orders-api:dev
          imagePullPolicy: IfNotPresent
          env:
            - { name: DATABASE_URL, value: "postgres://orders:orders@postgres:5432/orders?sslmode=disable" }
            - { name: REDIS_URL, value: "redis://redis:6379" }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "otel-collector:4317" }
            - { name: OTEL_SERVICE_NAME, value: "orders-api" }
            - { name: CHAOS_ERROR_RATE, value: "0" }
          ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: orders-api
spec:
  selector: { app: orders-api }
  ports: [{ port: 8080, targetPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-worker
spec:
  replicas: 1
  selector: { matchLabels: { app: payments-worker } }
  template:
    metadata: { labels: { app: payments-worker } }
    spec:
      containers:
        - name: payments-worker
          image: slo/payments-worker:dev
          imagePullPolicy: IfNotPresent
          env:
            - { name: REDIS_URL, value: "redis://redis:6379" }
            - { name: GATEWAY_URL, value: "http://mock-gateway:8090" }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "otel-collector:4317" }
            - { name: OTEL_SERVICE_NAME, value: "payments-worker" }
          ports: [{ containerPort: 8000 }]
---
apiVersion: v1
kind: Service
metadata:
  name: payments-worker
spec:
  selector: { app: payments-worker }
  ports: [{ port: 8000, targetPort: 8000 }]
---
