apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector: { matchLabels: { app: prometheus } }
  template:
    metadata: { labels: { app: prometheus } }
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=30d"
            - "--web.enable-lifecycle"
            - "--enable-feature=exemplar-storage"
          ports: [{ containerPort: 9090 }]
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus/prometheus.yml, subPath: prometheus.yml }
            - { name: rules, mountPath: /etc/prometheus/rules }
      volumes:
        - { name: config, configMap: { name: prometheus-config } }
        - { name: rules, configMap: { name: prometheus-rules } }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector: { app: prometheus }
  ports: [{ port: 9090, targetPort: 9090 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
spec:
  replicas: 1
  selector: { matchLabels: { app: alertmanager } }
  template:
    metadata: { labels: { app: alertmanager } }
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:latest
          args: ["--config.file=/etc/alertmanager/alertmanager.yml"]
          ports: [{ containerPort: 9093 }]
          volumeMounts:
            - { name: config, mountPath: /etc/alertmanager/alertmanager.yml, subPath: alertmanager.yml }
      volumes:
        - { name: config, configMap: { name: alertmanager-config } }
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
spec:
  selector: { app: alertmanager }
  ports: [{ port: 9093, targetPort: 9093 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-receiver
spec:
  replicas: 1
  selector: { matchLabels: { app: alert-receiver } }
  template:
    metadata: { labels: { app: alert-receiver } }
    spec:
      containers:
        - name: alert-receiver
          image: slo/alert-receiver:dev
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8092 }]
---
apiVersion: v1
kind: Service
metadata:
  name: alert-receiver
spec:
  selector: { app: alert-receiver }
  ports: [{ port: 8092, targetPort: 8092 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector: { matchLabels: { app: grafana } }
  template:
    metadata: { labels: { app: grafana } }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          env:
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "true" }
            - { name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: "Admin" }
            - { name: GF_SECURITY_ALLOW_EMBEDDING, value: "true" }
          ports: [{ containerPort: 3000 }]
          volumeMounts:
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dashprovider, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards }
      volumes:
        - { name: datasources, configMap: { name: grafana-datasources } }
        - { name: dashprovider, configMap: { name: grafana-dashboards-provider } }
        - { name: dashboards, configMap: { name: grafana-dashboards } }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  type: NodePort
  selector: { app: grafana }
  ports: [{ port: 3000, targetPort: 3000, nodePort: 30001 }]
