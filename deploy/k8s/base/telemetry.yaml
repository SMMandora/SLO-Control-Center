# Telemetry backends. The promtail + cadvisor collectors (DaemonSets needing
# RBAC/hostPath) are proven in the Docker Compose stack and omitted from the K8s
# v1 deploy; traces still flow (services -> otel-collector -> tempo).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
spec:
  replicas: 1
  selector: { matchLabels: { app: tempo } }
  template:
    metadata: { labels: { app: tempo } }
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:latest
          args: ["-config.file=/etc/tempo.yaml"]
          ports: [{ containerPort: 3200 }, { containerPort: 4317 }]
          volumeMounts:
            - { name: config, mountPath: /etc/tempo.yaml, subPath: tempo.yaml }
            - { name: data, mountPath: /var/tempo }
      volumes:
        - { name: config, configMap: { name: tempo-config } }
        - { name: data, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
spec:
  selector: { app: tempo }
  ports:
    - { name: http, port: 3200, targetPort: 3200 }
    - { name: otlp, port: 4317, targetPort: 4317 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
spec:
  replicas: 1
  selector: { matchLabels: { app: loki } }
  template:
    metadata: { labels: { app: loki } }
    spec:
      containers:
        - name: loki
          image: grafana/loki:latest
          args: ["-config.file=/etc/loki/loki.yaml"]
          ports: [{ containerPort: 3100 }]
          volumeMounts:
            - { name: config, mountPath: /etc/loki/loki.yaml, subPath: loki.yaml }
            - { name: data, mountPath: /loki }
      volumes:
        - { name: config, configMap: { name: loki-config } }
        - { name: data, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: loki
spec:
  selector: { app: loki }
  ports: [{ port: 3100, targetPort: 3100 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
spec:
  replicas: 1
  selector: { matchLabels: { app: otel-collector } }
  template:
    metadata: { labels: { app: otel-collector } }
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:latest
          args: ["--config=/etc/otel-collector-config.yaml"]
          ports: [{ containerPort: 4317 }]
          volumeMounts:
            - { name: config, mountPath: /etc/otel-collector-config.yaml, subPath: otel-collector-config.yaml }
      volumes:
        - { name: config, configMap: { name: otel-config } }
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
spec:
  selector: { app: otel-collector }
  ports: [{ port: 4317, targetPort: 4317 }]
